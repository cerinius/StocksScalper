version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: stockradar
      POSTGRES_PASSWORD: stockradar
      POSTGRES_DB: stockradar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://stockradar:stockradar@postgres:5432/stockradar
      REDIS_URL: redis://redis:6379
      DATA_PROVIDER: mock
      NEWS_PROVIDER: mock
      WEBHOOK_SECRET: local-dev-secret
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://stockradar:stockradar@postgres:5432/stockradar
      REDIS_URL: redis://redis:6379
      DATA_PROVIDER: mock
      NEWS_PROVIDER: mock
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
