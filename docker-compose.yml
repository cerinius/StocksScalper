services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: stockradar
      POSTGRES_PASSWORD: stockradar
      POSTGRES_DB: stockradar
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockradar -d stockradar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    environment:
      DATABASE_URL: postgresql://stockradar:stockradar@postgres:5432/stockradar
      REDIS_URL: redis://redis:6379
      API_PORT: 4210
      WEB_PORT: 3210
      GATEWAY_PORT: 4211
      MT5_ADAPTER_PORT: 4310
      API_BASE_URL: http://api:4210
      GATEWAY_BASE_URL: http://gateway:4211
      MT5_ADAPTER_URL: http://mt5-adapter:4310
      NEXT_PUBLIC_API_BASE: http://localhost:4210
      NEXT_PUBLIC_GATEWAY_BASE: http://localhost:4211
      TRADINGVIEW_WEBHOOK_SECRET: ${TRADINGVIEW_WEBHOOK_SECRET:-local-tv-secret}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      TRADING_MODE: ${TRADING_MODE:-paper}
      MANUAL_APPROVAL_MODE: ${MANUAL_APPROVAL_MODE:-false}
      KILL_SWITCH: ${KILL_SWITCH:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-4210}:4210"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4210/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    environment:
      DATABASE_URL: postgresql://stockradar:stockradar@postgres:5432/stockradar
      REDIS_URL: redis://redis:6379
      GATEWAY_PORT: 4211
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-4211}:4211"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4211/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  mt5-adapter:
    build:
      context: .
      dockerfile: docker/Dockerfile.mt5-adapter
    environment:
      MT5_ADAPTER_PORT: 4310
      TRADING_MODE: ${TRADING_MODE:-paper}
    ports:
      - "${MT5_ADAPTER_PORT:-4310}:4310"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4310/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker-news:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker-news
    environment:
      DATABASE_URL: postgresql://stockradar:stockradar@postgres:5432/stockradar
      REDIS_URL: redis://redis:6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    depends_on:
      api:
        condition: service_healthy

  worker-market:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker-market
    environment:
      DATABASE_URL: postgresql://stockradar:stockradar@postgres:5432/stockradar
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_healthy

  worker-validation:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker-validation
    environment:
      DATABASE_URL: postgresql://stockradar:stockradar@postgres:5432/stockradar
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_healthy

  worker-execution:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker-execution
    environment:
      DATABASE_URL: postgresql://stockradar:stockradar@postgres:5432/stockradar
      REDIS_URL: redis://redis:6379
      MT5_ADAPTER_URL: http://mt5-adapter:4310
      TRADING_MODE: ${TRADING_MODE:-paper}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    depends_on:
      api:
        condition: service_healthy
      mt5-adapter:
        condition: service_healthy

  worker-supervisor:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker-supervisor
    environment:
      DATABASE_URL: postgresql://stockradar:stockradar@postgres:5432/stockradar
      REDIS_URL: redis://redis:6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      SUPERVISOR_INTERVAL_MS: ${SUPERVISOR_INTERVAL_MS:-20000}
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    environment:
      WEB_PORT: 3210
      NEXT_PUBLIC_API_BASE: http://localhost:4210
      NEXT_PUBLIC_GATEWAY_BASE: http://localhost:4211
    depends_on:
      api:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3210}:3210"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3210').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
